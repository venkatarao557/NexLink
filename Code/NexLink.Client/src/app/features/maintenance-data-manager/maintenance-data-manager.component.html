<div class="data-manager-container">
  <div class="header-actions">
    <button mat-icon-button routerLink="/maintenance">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h2 class="mat-headline-small">{{ tableName() | titlecase }} Management</h2>
    <span class="spacer"></span>
    <button mat-flat-button color="primary" (click)="openEntryDialog()">
      <mat-icon>add</mat-icon> Add New Record
    </button>
  </div>

  @if (hasEditor()) {
    <mat-card appearance="outlined" class="editor-card">
      <div class="editor-header">
        <h3>{{ editorTitle() }}</h3>
      </div>

      <form [formGroup]="editorForm" class="editor-form" (ngSubmit)="saveRecord()">
        @for (col of displayedColumns(); track col) {
          <mat-form-field appearance="outline" class="editor-field">
            <mat-label>{{ col | titlecase }}</mat-label>
            <input matInput [formControlName]="col" />
          </mat-form-field>
        }

        <div class="editor-actions">
          <button mat-flat-button color="primary" type="submit" [disabled]="saving()">
            Save
          </button>
          <button mat-flat-button color="basic" type="button" (click)="cancelEdit()">
            Cancel
          </button>
        </div>
      </form>
    </mat-card>
  }

  <mat-card appearance="outlined" class="table-card">
    <table mat-table [dataSource]="dataSource()" class="mat-elevation-z0">
      @for (col of displayedColumns(); track col) {
        <ng-container [matColumnDef]="col">
          <th mat-header-cell *matHeaderCellDef> {{ col | titlecase }} </th>
          <td mat-cell *matCellDef="let element"> {{ element[col] }} </td>
        </ng-container>
      }

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button (click)="editRow(row)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="deleteRow(row)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="allColumns()"></tr>
      <tr mat-row *matRowDef="let row; columns: allColumns();"></tr>
    </table>
  </mat-card>
</div>
