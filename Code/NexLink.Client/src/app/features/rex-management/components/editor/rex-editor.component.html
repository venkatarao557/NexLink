<div class="editor-container">
  <mat-toolbar color="surface" class="editor-toolbar">
    <div class="title-section">
      <mat-icon>edit_document</mat-icon>
      <span>REX Editor - {{ rexForm.get('header.status.rexNumber')?.value || 'New Request' }}</span>
    </div>
    <span class="spacer"></span>
    <div class="action-group">
      <button mat-button (click)="onSave()">Save Draft</button>
      <button mat-flat-button color="primary" [disabled]="!rexForm.valid" (click)="onSubmit()">
        <mat-icon>send</mat-icon> Submit to NEXDOC
      </button>
    </div>
  </mat-toolbar>

  <div class="editor-content">
    <mat-tab-group dynamicHeight>
      <mat-tab label="General Header Details">
        <app-header-container [headerForm]="rexForm.get('header')"></app-header-container>
      </mat-tab>

      <mat-tab label="Product Line Items">
        <app-line-item-container [lineItems]="lineItemsArray"></app-line-item-container>
      </mat-tab>
    </mat-tab-group>
  </div>
</div>
