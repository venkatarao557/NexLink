<mat-card class="rex-card">
  <mat-card-header>
    <mat-card-title>Inspection Details</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="inspectionForm" class="rex-form-grid">
      <div class="row">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Establishment Nbr</mat-label>
          <mat-select formControlName="establishmentId">
            <mat-option *ngFor="let est of establishments" [value]="est.id">
              {{ est.display }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="row">
        <mat-form-field appearance="outline" class="flex-1">
          <mat-label>Required By Start Date</mat-label>
          <input matInput [matDatepicker]="startPicker" formControlName="startDate">
          <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
          <mat-datepicker #startPicker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" class="flex-1">
          <mat-label>Required By End Date</mat-label>
          <input matInput [matDatepicker]="endPicker" formControlName="endDate">
          <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
          <mat-datepicker #endPicker></mat-datepicker>
        </mat-form-field>
      </div>

      <div class="row">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Inspection Comment</mat-label>
          <textarea matInput formControlName="inspectionComment" rows="3" placeholder="Additional notes for the inspector..."></textarea>
        </mat-form-field>
      </div>
    </form>
  </mat-card-content>
</mat-card>
